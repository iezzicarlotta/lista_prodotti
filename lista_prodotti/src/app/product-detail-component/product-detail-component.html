<h2>Dettaglio prodotto</h2>

<section class="detail-box" *ngIf="product; else noSelection">
	<p><strong>Nome:</strong> {{ product.name }}</p>
	<p><strong>Prezzo:</strong> {{ product.price }} EUR</p>
	<p><strong>Descrizione:</strong> {{ product.description }}</p>
</section>

<ng-template #noSelection>
	<p class="no-selection">Nessun prodotto selezionato</p>
</ng-template>
