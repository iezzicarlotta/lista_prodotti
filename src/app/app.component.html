<div class="app-container">
  <header class="app-header">
    <h1>{{ title }}</h1>
  </header>

  <main class="app-main">
    <app-product-list
      (productSelected)="onProductSelected($event)"
      (productDeleted)="onProductDeleted($event)"
    ></app-product-list>
  </main>

  <footer class="app-footer">
    <p *ngIf="lastAction">Ultima azione: {{ lastAction }}</p>
  </footer>
</div>
